<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fonética inglesa — Práctica de pronunciación</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --text-muted: #64748b;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --success: #10b981;
  --success-bg: #d1fae5;
  --success-text: #065f46;
  --error: #ef4444;
  --error-bg: #fee2e2;
  --error-text: #991b1b;
  --warning: #f59e0b;
  --warning-bg: #fef3c7;
  --warning-text: #78350f;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; }
header { text-align: center; padding: 24px 16px 16px; }
header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
header p { color: var(--text-muted); font-size: 15px; }

.settings {
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: var(--text-muted);
  justify-content: center; margin-top: 12px; flex-wrap: wrap;
}
.settings select {
  font-family: inherit; font-size: 13px;
  padding: 5px 8px; border-radius: 6px;
  border: 1px solid var(--border); background: white;
}
.settings .icon-btn {
  background: none; border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 6px; font-size: 13px;
  color: var(--text-muted); cursor: pointer; font-family: inherit;
}
.settings .icon-btn:hover { background: white; color: var(--text); }

.phoneme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px;
  margin-top: 24px;
}
.phoneme-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  font-family: inherit;
  display: flex; flex-direction: column;
}
.phoneme-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}
.phoneme-card.complete { border-color: var(--success); }
.phoneme-symbol {
  font-size: 30px; font-weight: 700;
  font-family: "Charis SIL", "Doulos SIL", "Lucida Sans Unicode", Georgia, serif;
  color: var(--accent);
}
.phoneme-card.complete .phoneme-symbol { color: var(--success); }
.phoneme-name { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.phoneme-example { font-size: 14px; margin-top: 8px; color: var(--text); font-style: italic; }
.progress-track {
  height: 4px; background: var(--border);
  border-radius: 99px; margin-top: 12px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--success);
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 11px; color: var(--text-muted);
  margin-top: 6px; font-variant-numeric: tabular-nums;
}

.back-btn {
  background: none; border: none;
  color: var(--text-muted); font-size: 14px;
  cursor: pointer; padding: 8px 0; font-family: inherit;
}
.back-btn:hover { color: var(--text); }

.practice-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border); gap: 12px;
}
.practice-header h2 {
  font-size: 22px; font-weight: 600;
  font-family: "Charis SIL", Georgia, serif;
}
.practice-header p { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
.practice-progress {
  font-variant-numeric: tabular-nums;
  font-size: 14px; color: var(--text-muted);
  text-align: right; flex-shrink: 0;
}

.word-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 36px 24px;
  margin-top: 20px;
  text-align: center;
  transition: border-color 0.3s, background 0.3s;
}
.word-card.success { border-color: var(--success); background: var(--success-bg); }
.word-card.error { border-color: var(--error); background: var(--error-bg); }
.word-card.listening { border-color: var(--warning); background: var(--warning-bg); }
.word-ipa {
  font-family: "Charis SIL", "Lucida Sans Unicode", Georgia, serif;
  color: var(--text-muted); font-size: 18px; margin-bottom: 6px;
}
.word-text {
  font-size: 56px; font-weight: 700;
  letter-spacing: -1px; line-height: 1.1;
}
.word-meaning {
  color: var(--text-muted); font-size: 15px;
  margin-top: 10px; font-style: italic;
}

.controls {
  display: flex; gap: 10px; margin-top: 22px;
  justify-content: center; flex-wrap: wrap;
}
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 12px 18px;
  border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg); border-color: var(--text-muted); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.primary {
  background: var(--accent); color: white;
  border-color: var(--accent); padding: 14px 26px; font-size: 15px;
}
.btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn.recording {
  background: var(--error); border-color: var(--error);
  color: white; animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.45); }
  50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
}

.feedback {
  margin-top: 16px; padding: 14px 18px;
  border-radius: 10px; font-size: 14px;
  text-align: center; display: none;
}
.feedback.show { display: block; }
.feedback.success { background: var(--success-bg); color: var(--success-text); }
.feedback.error { background: var(--error-bg); color: var(--error-text); }
.feedback.info { background: white; color: var(--text-muted); border: 1px solid var(--border); }
.heard-text {
  font-family: "Charis SIL", Georgia, serif;
  font-style: italic; font-weight: 600;
}

.skip-row { text-align: center; margin-top: 18px; }
.skip-row button {
  background: none; border: none; color: var(--text-muted);
  font-size: 13px; cursor: pointer; text-decoration: underline;
  font-family: inherit;
}
.skip-row button:hover { color: var(--text); }

.completion {
  text-align: center; padding: 48px 24px;
  background: var(--surface); border-radius: 18px;
  border: 1px solid var(--border); margin-top: 20px;
}
.completion .check {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--success); color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 16px;
}
.completion h2 { font-size: 24px; margin-bottom: 8px; }
.completion p { color: var(--text-muted); margin-bottom: 24px; }

.warn-banner {
  background: var(--warning-bg); border: 1px solid var(--warning);
  color: var(--warning-text); padding: 12px 16px;
  border-radius: 10px; margin: 12px 0;
  font-size: 13px; text-align: center;
}

.footer-note {
  text-align: center; font-size: 12px;
  color: var(--text-muted); margin-top: 24px; padding: 16px;
}

@media (max-width: 480px) {
  .word-text { font-size: 44px; }
  .controls .btn { padding: 11px 14px; font-size: 13px; }
  .controls .btn.primary { padding: 12px 18px; font-size: 14px; }
  header h1 { font-size: 24px; }
  .word-card { padding: 28px 18px; }
}
</style>
</head>
<body>
<div class="container">

<div id="screen-home">
  <header>
    <h1>Fonética inglesa</h1>
    <p>Practica los sonidos del inglés que no existen en español</p>
  </header>
  <div id="warn-area"></div>
  <div class="settings">
    <label>Voz:

    </label>
    <button class="icon-btn" id="reset-btn">Reiniciar progreso</button>
  </div>
  <div class="phoneme-grid" id="phoneme-grid"></div>
  <div class="footer-note">
    Concede permiso al micrófono cuando el navegador lo pida. Funciona mejor en Chrome, Edge o Safari.
  </div>
</div>

<div id="screen-practice" style="display:none">
  <button class="back-btn" id="back-btn">← Volver al menú</button>
  <div class="practice-header">
    <div>
      <h2 id="practice-symbol"></h2>
      <p id="practice-description"></p>
    </div>
    <div class="practice-progress" id="practice-progress"></div>
  </div>

  <div class="word-card" id="word-card">
    <div class="word-ipa" id="word-ipa"></div>
    <div class="word-text" id="word-text"></div>
    <div class="word-meaning" id="word-meaning"></div>
  </div>

  <div class="controls">
    <button class="btn" id="listen-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.04v7.92A4.5 4.5 0 0016.5 12z"/></svg>
      Escuchar
    </button>
    <button class="btn" id="listen-slow-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      Despacio
    </button>
    <button class="btn primary" id="record-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      <span id="record-label">Grabar</span>
    </button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="skip-row">
    <button id="skip-btn">Saltar palabra</button>
  </div>
</div>

<div id="screen-done" style="display:none">
  <button class="back-btn" id="done-back">← Volver al menú</button>
  <div class="completion">
    <div class="check">✓</div>
    <h2>¡Sonido completado!</h2>
    <p id="done-message"></p>
    <button class="btn primary" id="done-btn">Volver a los sonidos</button>
  </div>
</div>

</div>

      { word: 'young', ipa: '/jʌŋ/', meaning: 'joven' },
      { word: 'strong', ipa: '/strɒŋ/', meaning: 'fuerte' },
      { word: 'morning', ipa: '/ˈmɔːnɪŋ/', meaning: 'mañana' },
    ]},
  { id: 'w', symbol: '/w/', name: 'W consonántica', description: 'Labios bien redondeados al inicio',
    words: [
      { word: 'water', ipa: '/ˈwɔːtər/', meaning: 'agua' },
      { word: 'window', ipa: '/ˈwɪndəʊ/', meaning: 'ventana' },
      { word: 'what', ipa: '/wɒt/', meaning: 'qué' },
      { word: 'where', ipa: '/weər/', meaning: 'dónde' },
      { word: 'why', ipa: '/waɪ/', meaning: 'por qué' },
      { word: 'work', ipa: '/wɜːk/', meaning: 'trabajo' },
      { word: 'world', ipa: '/wɜːld/', meaning: 'mundo' },
      { word: 'one', ipa: '/wʌn/', meaning: 'uno' },
    ]},
];

let currentPhoneme = null;
let currentWordIdx = 0;
let attempts = 0;
let isRecording = false;
let recognition = null;

const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
const SpeechSynthesisAPI = window.speechSynthesis;

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('phon-progress') || '{}'); }
  catch { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem('phon-progress', JSON.stringify(p)); } catch {}
}
function markWordDone(phonemeId, wordIdx) {
  const p = loadProgress();
  if (!p[phonemeId]) p[phonemeId] = {};
  p[phonemeId][wordIdx] = true;
  saveProgress(p);
}
function getPhonemeProgress(phonemeId) {
  const p = loadProgress();
  return p[phonemeId] || {};
}

function checkSupport() {
  const banner = document.getElementById('warn-area');
  const issues = [];
  if (!SpeechRecognitionAPI) issues.push('reconocimiento de voz');
  if (!SpeechSynthesisAPI) issues.push('síntesis de voz');
  if (issues.length > 0) {
    banner.innerHTML = '<div class="warn-banner">Tu navegador no soporta ' + issues.join(' ni ') + '. Usa Chrome, Edge o Safari para que la app funcione.</div>';
  }
}

function renderHome() {
  const grid = document.getElementById('phoneme-grid');
  grid.innerHTML = '';
  PHONEMES.forEach(p => {
    const progress = getPhonemeProgress(p.id);
    const completed = Object.keys(progress).filter(k => progress[k]).length;
    const total = p.words.length;
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
    const isComplete = completed === total;

    const card = document.createElement('button');
    card.className = 'phoneme-card' + (isComplete ? ' complete' : '');
    card.innerHTML =
      '<div class="phoneme-symbol">' + p.symbol + '</div>' +
      '<div class="phoneme-name">' + p.name + '</div>' +
      '<div class="phoneme-example">' + p.words[0].word + ', ' + p.words[1].word + '…</div>' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-label">' + completed + '/' + total + ' dominadas</div>';
    card.addEventListener('click', () => startPractice(p));
    grid.appendChild(card);
  });
}

function startPractice(phoneme) {
  currentPhoneme = phoneme;
  const progress = getPhonemeProgress(phoneme.id);
  const firstUndone = phoneme.words.findIndex((_, i) => !progress[i]);
  currentWordIdx = firstUndone >= 0 ? firstUndone : 0;
  attempts = 0;
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-done').style.display = 'none';
  document.getElementById('screen-practice').style.display = 'block';
  document.getElementById('practice-symbol').textContent = phoneme.symbol + ' ' + phoneme.name;
  document.getElementById('practice-description').textContent = phoneme.description;
  showCurrentWord();
}

function showCurrentWord() {
  if (currentWordIdx >= currentPhoneme.words.length) {
    showCompletion();
    return;
  }
  const word = currentPhoneme.words[currentWordIdx];
  document.getElementById('practice-progress').textContent = (currentWordIdx + 1) + ' / ' + currentPhoneme.words.length;
  document.getElementById('word-ipa').textContent = word.ipa;
  document.getElementById('word-text').textContent = word.word;
  document.getElementById('word-meaning').textContent = word.meaning;
  document.getElementById('word-card').className = 'word-card';
  document.getElementById('feedback').className = 'feedback';
  attempts = 0;
  setTimeout(() => speak(word.word, false), 350);
}

function showCompletion() {
  document.getElementById('screen-practice').style.display = 'none';
  document.getElementById('screen-done').style.display = 'block';
  document.getElementById('done-message').textContent =
    'Has practicado todas las palabras de ' + currentPhoneme.symbol + ' ' + currentPhoneme.name + '.';
}

function speak(text, slow) {
  if (!SpeechSynthesisAPI) return;
  SpeechSynthesisAPI.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = document.getElementById('voice-select').value;
  utterance.rate = slow ? 0.55 : 0.9;
  utterance.pitch = 1;
  const voices = SpeechSynthesisAPI.getVoices();
  const lang = utterance.lang;
  const voice = voices.find(v => v.lang === lang)
             || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (voice) utterance.voice = voice;
  SpeechSynthesisAPI.speak(utterance);
}

function startRecording() {
  if (!SpeechRecognitionAPI) {
    showFeedback('Tu navegador no soporta reconocimiento de voz.', 'error');
    return;
  }
  if (isRecording) return;

  recognition = new SpeechRecognitionAPI();
  recognition.lang = document.getElementById('voice-select').value;
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;

  isRecording = true;
  document.getElementById('record-btn').classList.add('recording');
  document.getElementById('record-label').textContent = 'Escuchando…';
  document.getElementById('word-card').classList.add('listening');
  document.getElementById('feedback').className = 'feedback';

  recognition.onresult = (event) => {
    const results = event.results[0];
    const alternatives = [];
    for (let i = 0; i < results.length; i++) {
      alternatives.push(results[i].transcript);
    }
    evaluatePronunciation(alternatives);
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') {
      showFeedback('No te he oído. Inténtalo otra vez.', 'info');
    } else if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      showFeedback('Necesito permiso para usar el micrófono.', 'error');
    } else if (event.error !== 'aborted') {
      showFeedback('Error de reconocimiento: ' + event.error, 'error');
    }
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('record-btn').classList.remove('recording');
    document.getElementById('record-label').textContent = 'Grabar';
    document.getElementById('word-card').classList.remove('listening');
  };

  try {
    recognition.start();
  } catch (e) {
    isRecording = false;
    document.getElementById('record-btn').classList.remove('recording');
    document.getElementById('record-label').textContent = 'Grabar';
    document.getElementById('word-card').classList.remove('listening');
    showFeedback('No se pudo iniciar la grabación.', 'error');
  }
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/[^a-z']/g, '');
}

function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const m = [];
  for (let i = 0; i <= b.length; i++) m[i] = [i];
  for (let j = 0; j <= a.length; j++) m[0][j] = j;
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b[i-1] === a[j-1]) m[i][j] = m[i-1][j-1];
      else m[i][j] = 1 + Math.min(m[i-1][j-1], m[i][j-1], m[i-1][j]);
    }
  }
  return m[b.length][a.length];
}

function isMatch(target, heard) {
  const t = normalize(target);
  const h = normalize(heard);
  if (!h) return false;
  if (t === h) return true;
  const heardWords = h.split(/\s+/).filter(Boolean);
  if (heardWords.includes(t)) return true;
  if (t.length >= 6 && levenshtein(t, h) <= 1) return true;
  for (const w of heardWords) {
    if (w === t) return true;
    if (t.length >= 6 && levenshtein(t, w) <= 1) return true;
  }
  return false;
}

function evaluatePronunciation(alternatives) {
  const target = currentPhoneme.words[currentWordIdx].word;
  let matched = false;
  for (const alt of alternatives) {
    if (isMatch(target, alt)) { matched = true; break; }
  }
  attempts++;

  if (matched) {
    document.getElementById('word-card').classList.add('success');
    showFeedback('¡Correcto! Has dicho <span class="heard-text">' + escapeHTML(alternatives[0]) + '</span>', 'success');
    markWordDone(currentPhoneme.id, currentWordIdx);
    setTimeout(() => {
      currentWordIdx++;
      showCurrentWord();
    }, 1200);
  } else {
    document.getElementById('word-card').classList.add('error');
    setTimeout(() => document.getElementById('word-card').classList.remove('error'), 1500);
    let msg = 'He oído <span class="heard-text">' + escapeHTML(alternatives[0]) + '</span> en lugar de <span class="heard-text">' + escapeHTML(target) + '</span>. Inténtalo otra vez.';
    if (attempts >= 3) {
      msg += '<br><small style="opacity:0.8">Pulsa "Despacio" para oírla de nuevo y fíjate en la posición de la boca.</small>';
    }
    showFeedback(msg, 'error');
  }
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function showFeedback(html, type) {
  const el = document.getElementById('feedback');
  el.innerHTML = html;
  el.className = 'feedback show ' + type;
}

document.getElementById('listen-btn').addEventListener('click', () => {
  speak(currentPhoneme.words[currentWordIdx].word, false);
});
document.getElementById('listen-slow-btn').addEventListener('click', () => {
  speak(currentPhoneme.words[currentWordIdx].word, true);
});
document.getElementById('record-btn').addEventListener('click', () => {
  if (isRecording) {
    if (recognition) { try { recognition.stop(); } catch {} }
  } else {
    startRecording();
  }
});
document.getElementById('skip-btn').addEventListener('click', () => {
  if (recognition && isRecording) { try { recognition.abort(); } catch {} }
  currentWordIdx++;
  showCurrentWord();
});
document.getElementById('back-btn').addEventListener('click', () => {
  if (recognition && isRecording) { try { recognition.abort(); } catch {} }
  document.getElementById('screen-practice').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
  renderHome();
});
document.getElementById('done-back').addEventListener('click', () => {
  document.getElementById('screen-done').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
  renderHome();
});
document.getElementById('done-btn').addEventListener('click', () => {
  document.getElementById('screen-done').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
  renderHome();
});
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('¿Reiniciar todo el progreso?')) {
    try { localStorage.removeItem('phon-progress'); } catch {}
    renderHome();
  }
});

checkSupport();
renderHome();
if (SpeechSynthesisAPI) {
  SpeechSynthesisAPI.getVoices();
  SpeechSynthesisAPI.onvoiceschanged = () => SpeechSynthesisAPI.getVoices();
}
</script>

</html>
